model:
  name_or_path: "Qwen/Qwen2.5-1.5B" # Using a smaller model for local testing
  max_length: 256

data:
  dataset_name: "HuggingFaceTB/smoltalk"
  behavior_instruction: "Answer in Spanish."
  batch_size: 4

training:
  epochs: 2
  learning_rate: 1e-4
  weight_decay: 1e-3
  temperature: 10.0
  device: "cuda"

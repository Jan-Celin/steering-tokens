model:
  name_or_path: "Qwen/Qwen2.5-1.5B"
  max_length: 256

data:
  module: "data.arithmetic_dataset"
  dataset_name: "fblgit/simple-math"
  batch_size: 16
  input_max_length: 32
  target_max_length: 16
  num_workers: 0
  pin_memory: false

training:
  epochs: 2
  learning_rate: 1e-4
  weight_decay: 1e-3
  temperature: 10.0
  device: "mps"

intervention:
  module: "interventions.arithmetic"
  name: "arithmetic"
  params:
    operator_text: "+"

model:
  name_or_path: "Qwen/Qwen2.5-1.5B"
  max_length: 256

data:
  module: "data.translation_dataset"
  dataset_path: "datasets/translation/en_es.json"
  batch_size: 16
  input_max_length: 32
  target_max_length: 16
  num_workers: 0
  pin_memory: false

training:
  epochs: 20
  learning_rate: 1e-4
  weight_decay: 1e-3
  temperature: 10.0
  device: "cuda"
  max_steps: null

intervention:
  module: "interventions.translation"
  name: "translation"
  params:
    steering_text: "translate"
